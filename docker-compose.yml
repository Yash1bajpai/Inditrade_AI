version: '3.8'

services:
  api:
    build: .
    container_name: inditrade_api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-your_groq_free_api_key_here}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload
